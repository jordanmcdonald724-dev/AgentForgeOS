<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AgentForgeOS — Setup Wizard</title>
    <link rel="stylesheet" href="wizard.css" />
  </head>
  <body>
    <div class="wizard-shell">
      <!-- ── Sidebar ── -->
      <aside class="wizard-sidebar">
        <div class="brand">
          <span class="brand-icon">⚙</span>
          <span class="brand-name">AgentForgeOS</span>
        </div>
        <nav class="step-nav" id="step-nav" aria-label="Setup steps">
          <div class="step-item" data-step="1">
            <span class="step-dot"></span>
            <span class="step-label">Welcome</span>
          </div>
          <div class="step-item" data-step="2">
            <span class="step-dot"></span>
            <span class="step-label">LLM Provider</span>
          </div>
          <div class="step-item" data-step="3">
            <span class="step-dot"></span>
            <span class="step-label">Image &amp; Voice</span>
          </div>
          <div class="step-item" data-step="4">
            <span class="step-dot"></span>
            <span class="step-label">Storage &amp; Bridge</span>
          </div>
          <div class="step-item" data-step="5">
            <span class="step-dot"></span>
            <span class="step-label">Review &amp; Save</span>
          </div>
        </nav>
        <div class="sidebar-footer">v1.0 · First-run setup</div>
      </aside>
      <!-- ...existing code... -->
    </div>
  </body>
</html>
